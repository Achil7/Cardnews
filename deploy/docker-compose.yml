version: '3.8'

services:
  cardnews:
    image: achil7/cardnews:latest
    container_name: cardnews-app
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      # .env (GUI 설정 페이지가 키를 읽고/저장하려면 파일이 컨테이너 안에 있어야 함)
      - ./.env:/app/.env
      # Google Drive 인증 토큰 (최초 1회 로컬에서 인증 후 복사)
      - ./token.json:/app/token.json
      - ./credentials.json:/app/credentials.json
      # accounts.yaml (서버에서 직접 수정 가능)
      - ./accounts.yaml:/app/accounts.yaml
      # 오버레이 프리셋: 썸네일 드롭=즉시 반영, formats.yaml 편집=다음 picker 로드 (호스트에 먼저 존재해야 함)
      - ./formats/thumbnails:/app/src/gui/formats/thumbnails
      - ./formats/formats.yaml:/app/src/gui/formats/formats.yaml
      # DB 영속성
      - ./data:/app/data
    restart: unless-stopped
