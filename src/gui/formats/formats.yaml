formats:
  - id: "classic_dark"
    name: "클래식 다크"
    description: "어두운 배경 + 이미지 분석 기반 텍스트 배치"
    thumbnail: "format_classic.jpg"
    templates:
      hook: "card_meme_hook.html"
      screenshot: "card_meme_screenshot.html"
      punchline: "card_meme_punchline.html"
      outro: "card_meme_outro.html"
    style_overrides: {}

# 오버레이 프리셋 — 썸네일 파일명(thumbnails/ 안)을 키로.
# 엔트리 없는 이미지는 기본값(하단·흰색·64px·그라데이션·외곽선·contain) 적용.
# 필드: text_position(top|center|bottom|auto), text_color, text_size(px),
#       text_bg(none|shadow|bar|gradient), image_fit(cover|contain),
#       text_outline(true|false = 흰글씨 검은 외곽선)
overlays:
  "1.jpg":
    name: "하단 외곽선"          # 이슈카드 기본형: 이미지 위 + 하단 굵은 흰글씨+검정외곽선
    text_position: bottom
    text_color: "#FFFFFF"
    text_size: 64
    text_bg: gradient
    image_fit: contain
    text_outline: true
  "2.jpg":
    name: "하단 블랙바 외곽선"    # 이미지 꽉채우고 하단 검은띠 위 글씨
    text_position: bottom
    text_color: "#FFFFFF"
    text_size: 60
    text_bg: bar
    image_fit: cover
    text_outline: true
  "3.jpg":
    name: "가운데 외곽선"
    text_position: center
    text_color: "#FFFFFF"
    text_size: 64
    text_bg: none
    image_fit: contain
    text_outline: true
